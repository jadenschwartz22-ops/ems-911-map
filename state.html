<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>911 EMS Coverage Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { height: 100vh; width: 100%; }
.sidebar {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  width: 320px; max-height: calc(100vh - 20px); overflow-y: auto;
}
.sidebar h2 { padding: 14px 16px 6px; font-size: 16px; }
.sidebar .subtitle { padding: 0 16px 12px; font-size: 12px; color: #888; border-bottom: 1px solid #eee; }
.nav-links { padding: 8px 16px; border-bottom: 1px solid #eee; font-size: 12px; display: flex; flex-wrap: wrap; gap: 4px 12px; }
.nav-links a { color: #3498db; text-decoration: none; }
.nav-links a.active { font-weight: 600; color: #333; }
.search-bar { padding: 8px 16px; border-bottom: 1px solid #eee; }
.search-bar input { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
.footer { padding: 10px 16px; font-size: 10px; color: #aaa; border-top: 1px solid #eee; line-height: 1.4; }
.auth-badge { display: inline-block; background: #d4edda; color: #155724; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
.district-label span { font-size: 9px; font-weight: 600; color: #fff; white-space: nowrap; text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 2px #000; pointer-events: none; }
.info-popup h3 { margin: 0 0 6px; font-size: 14px; }
.info-popup .row { font-size: 12px; color: #444; margin-bottom: 3px; }
.info-popup .row strong { color: #222; }
</style>
</head>
<body>
<div id="map"></div>
<div class="sidebar">
  <h2 id="title">Loading...</h2>
  <div class="subtitle" id="subtitle"></div>
  <div class="nav-links">
    <a href="index.html">US Map</a>
    <a href="colorado.html">CO</a>
    <a href="georgia.html">GA</a>
    <a href="minnesota.html">MN</a>
    <a href="state.html?s=nd">ND</a>
    <a href="state.html?s=ut">UT</a>
    <a href="state.html?s=in">IN</a>
    <a href="state.html?s=ky">KY</a>
    <a href="contribute.html" style="color:#e67e22">Fix</a>
  </div>
  <div class="search-bar"><input type="text" id="search" placeholder="Search agency name..."></div>
  <div class="footer" id="footer"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STATES = {
  nd: {
    name: 'North Dakota', center: [47.5, -100.5], zoom: 7,
    emsFile: 'data/nd-ems-simple.geojson', stateFile: 'data/nd-state-simple.geojson',
    nameField: 'DsplayName', features: 147, agencies: 127,
    source: 'ND GIS Hub / Dept of Health', authoritative: true,
    notes: 'Licensed ambulance service areas from ND DOH. NG911 data.',
  },
  ut: {
    name: 'Utah', center: [39.5, -111.5], zoom: 7,
    emsFile: 'data/ut-ems-simple.geojson', stateFile: 'data/ut-state-simple.geojson',
    nameField: 'DsplayName', features: 123, agencies: 123,
    source: 'UGRC / Bureau of EMS & Preparedness', authoritative: true,
    notes: 'EMS response areas compiled from BEMSP licensing + CAD data for NG911.',
  },
  'in': {
    name: 'Indiana', center: [39.8, -86.2], zoom: 7,
    emsFile: 'data/in-ems-simple.geojson', stateFile: 'data/in-state-simple.geojson',
    nameField: 'dsplayname', features: 248, agencies: 114,
    source: 'Indiana Geographic Information Office / NG911', authoritative: true,
    notes: 'County-maintained EMS boundaries. Released Dec 2024.',
  },
  ky: {
    name: 'Kentucky', center: [37.8, -85.7], zoom: 7,
    emsFile: 'data/ky-ems-simple.geojson', stateFile: 'data/ky-state-simple.geojson',
    nameField: 'DsplayName', features: 415, agencies: 211,
    source: 'KyGeoNet / Kentucky 911', authoritative: true,
    notes: 'NG911 EMS Emergency Service Boundaries.',
  },
};

const params = new URLSearchParams(window.location.search);
const stateKey = params.get('s') || 'nd';
const S = STATES[stateKey];

if (!S) { document.body.innerHTML = '<h1 style="padding:40px">State not found. <a href="index.html">Back to map</a></h1>'; }

document.title = `${S.name} 911 EMS Coverage Map`;
document.getElementById('title').innerHTML = `${S.name} EMS Coverage <span class="auth-badge">NG911 DATA</span>`;
document.getElementById('subtitle').textContent = `${S.features} service area boundaries. ${S.agencies} agencies.`;
document.getElementById('footer').innerHTML = `Source: ${S.source}. ${S.notes}`;

// Highlight active nav link
document.querySelectorAll('.nav-links a').forEach(a => {
  if (a.href.includes(`s=${stateKey}`)) a.classList.add('active');
});

// Color palette - hash agency name to consistent color
const PALETTE = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22',
  '#c0392b','#2980b9','#27ae60','#d35400','#8e44ad','#16a085','#f1c40f',
  '#7f8c8d','#2c3e50','#a93226','#148f77','#d4ac0d','#6c3483','#1a5276',
  '#117a65','#b03a2e','#0e6655','#922b21','#7d3c98','#138d75','#cb4335'];

function agencyColor(name) {
  if (!name) return '#95a5a6';
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(hash) % PALETTE.length];
}

const map = L.map('map').setView(S.center, S.zoom);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
}).addTo(map);

let areaLyrs = {};
const labelGroup = L.layerGroup();

Promise.all([
  fetch(S.stateFile).then(r => r.json()),
  fetch(S.emsFile).then(r => r.json()),
]).then(([state, ems]) => {
  L.geoJSON(state, { style: { fillColor: 'transparent', fillOpacity: 0, color: '#fff', weight: 1.5, opacity: 0.2 } }).addTo(map);

  ems.features.forEach(f => {
    const p = f.properties;
    const name = p[S.nameField] || p.DsplayName || p.dsplayname || 'Unknown';
    const county = p.County || p.county || '';
    const agencyId = p.Agency_ID || p.agency_id || '';
    const color = agencyColor(name);

    const lyr = L.geoJSON(f, {
      style: { fillColor: color, fillOpacity: 0.5, color: '#fff', weight: 1, opacity: 0.6 }
    }).addTo(map);

    lyr.bindPopup(`<div class="info-popup">
      <h3>${name}</h3>
      ${county ? `<div class="row"><strong>County:</strong> ${county}</div>` : ''}
      ${agencyId ? `<div class="row"><strong>Agency ID:</strong> ${agencyId}</div>` : ''}
      <div class="row"><strong>Source:</strong> ${S.source}</div>
    </div>`);

    lyr.on('mouseover', function() { this.setStyle({ fillOpacity: 0.75, weight: 2 }); });
    lyr.on('mouseout', function() { this.setStyle({ fillOpacity: 0.5, weight: 1 }); });

    areaLyrs[name + '_' + county] = lyr;

    const bounds = lyr.getBounds();
    L.marker(bounds.getCenter(), {
      icon: L.divIcon({ className: 'district-label', html: `<span>${name.split(',')[0].substring(0,25)}</span>`, iconSize: null })
    }).addTo(labelGroup);
  });

  function updateLabels() {
    if (map.getZoom() >= 9) { if (!map.hasLayer(labelGroup)) labelGroup.addTo(map); }
    else { if (map.hasLayer(labelGroup)) map.removeLayer(labelGroup); }
  }
  map.on('zoomend', updateLabels);
  updateLabels();

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (q.length < 2) return;
    for (const [key, lyr] of Object.entries(areaLyrs)) {
      if (key.toLowerCase().includes(q)) {
        map.fitBounds(lyr.getBounds().pad(0.3));
        lyr.getLayers()[0].openPopup();
        return;
      }
    }
  });
});
</script>
</body>
</html>
