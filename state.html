<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>911 EMS Coverage Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { height: 100vh; width: 100%; }
.sidebar {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  width: 320px; max-height: calc(100vh - 20px); overflow-y: auto;
}
.sidebar h2 { padding: 14px 16px 6px; font-size: 16px; }
.sidebar .subtitle { padding: 0 16px 12px; font-size: 12px; color: #888; border-bottom: 1px solid #eee; }
.nav-links { padding: 8px 16px; border-bottom: 1px solid #eee; font-size: 12px; display: flex; flex-wrap: wrap; gap: 4px 12px; }
.nav-links a { color: #3498db; text-decoration: none; }
.nav-links a.active { font-weight: 600; color: #333; }
.search-bar { padding: 8px 16px; border-bottom: 1px solid #eee; }
.search-bar input { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
.footer { padding: 10px 16px; font-size: 10px; color: #aaa; border-top: 1px solid #eee; line-height: 1.4; }
.auth-badge { display: inline-block; background: #d4edda; color: #155724; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
.district-label span { font-size: 10px; font-weight: 700; color: #222; white-space: nowrap; text-shadow: 0 0 3px #fff, 0 0 6px #fff, 0 0 9px #fff; pointer-events: none; }
.info-popup h3 { margin: 0 0 6px; font-size: 14px; }
.info-popup .row { font-size: 12px; color: #444; margin-bottom: 3px; }
.info-popup .row strong { color: #222; }
</style>
</head>
<body>
<div id="map"></div>
<div class="sidebar">
  <h2 id="title">Loading...</h2>
  <div class="subtitle" id="subtitle"></div>
  <div class="nav-links">
    <a href="index.html">US Map</a>
    <a href="state.html?s=co">CO</a>
    <a href="state.html?s=ga">GA</a>
    <a href="state.html?s=mn">MN</a>
    <a href="state.html?s=nd">ND</a>
    <a href="state.html?s=ut">UT</a>
    <a href="state.html?s=in">IN</a>
    <a href="state.html?s=ky">KY</a>
    <a href="state.html?s=ne">NE</a>
    <a href="state.html?s=or">OR</a>
    <a href="state.html?s=vt">VT</a>
    <a href="state.html?s=ks">KS</a>
    <a href="state.html?s=me">ME</a>
    <a href="state.html?s=wa">WA</a>
    <a href="state.html?s=ok">OK</a>
    <a href="state.html?s=mo">MO</a>
    <a href="state.html?s=wi">WI</a>
    <a href="state.html?s=az">AZ</a>
    <a href="state.html?s=id">ID</a>
    <a href="contribute.html" style="color:#e67e22">Fix</a>
  </div>
  <div class="search-bar"><input type="text" id="search" placeholder="Search agency name..."></div>
  <div class="footer" id="footer"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STATES = {
  co: {
    name: 'Colorado', center: [39.0, -105.5], zoom: 7,
    emsFile: 'data/co-ems-simple.geojson', stateFile: 'data/co-state-simple.geojson',
    nameField: 'name', features: 267, agencies: 267,
    source: 'CO DOLA fire districts + CDPHE ambulance districts + municipal FDs', authoritative: false,
    notes: 'Fire district boundaries - may not reflect 911 transport provider. Best available until CO publishes NG911 EMS data.',
  },
  ga: {
    name: 'Georgia', center: [32.7, -83.5], zoom: 7,
    emsFile: 'data/ga-ems-simple.geojson', stateFile: 'data/ga-state-simple.geojson',
    nameField: 'name', features: 159, agencies: 134,
    source: 'GA DPH + GTCNC EMS grant data + agency research', authoritative: false,
    notes: 'County-level data. GA NG911 EMS layer exists but is empty as of March 2026.',
  },
  mn: {
    name: 'Minnesota', center: [46.3, -94.8], zoom: 7,
    emsFile: 'data/mn-ems-areas-simple.geojson', stateFile: 'data/mn-state-simple.geojson',
    nameField: 'AmbServNam', features: 478, agencies: 249,
    source: 'MN EMSRB - legally authoritative PSA boundaries', authoritative: true,
    notes: 'Gold standard. Legally designated Primary Service Areas.',
    extraFields: ['ServLevel', 'EMSRegion', 'County', 'AmbLiceNum'],
  },
  nd: {
    name: 'North Dakota', center: [47.5, -100.5], zoom: 7,
    emsFile: 'data/nd-ems-simple.geojson', stateFile: 'data/nd-state-simple.geojson',
    nameField: 'DsplayName', features: 147, agencies: 127,
    source: 'ND GIS Hub / Dept of Health', authoritative: true,
    notes: 'Licensed ambulance service areas from ND DOH. NG911 data.',
  },
  ut: {
    name: 'Utah', center: [39.5, -111.5], zoom: 7,
    emsFile: 'data/ut-ems-simple.geojson', stateFile: 'data/ut-state-simple.geojson',
    nameField: 'DsplayName', features: 123, agencies: 123,
    source: 'UGRC / Bureau of EMS & Preparedness', authoritative: true,
    notes: 'EMS response areas compiled from BEMSP licensing + CAD data for NG911.',
  },
  'in': {
    name: 'Indiana', center: [39.8, -86.2], zoom: 7,
    emsFile: 'data/in-ems-simple.geojson', stateFile: 'data/in-state-simple.geojson',
    nameField: 'dsplayname', features: 248, agencies: 114,
    source: 'Indiana Geographic Information Office / NG911', authoritative: true,
    notes: 'County-maintained EMS boundaries. Released Dec 2024.',
  },
  ky: {
    name: 'Kentucky', center: [37.8, -85.7], zoom: 7,
    emsFile: 'data/ky-ems-simple.geojson', stateFile: 'data/ky-state-simple.geojson',
    nameField: 'DsplayName', features: 415, agencies: 211,
    source: 'KyGeoNet / Kentucky 911', authoritative: true,
    notes: 'NG911 EMS Emergency Service Boundaries.',
  },
  ne: {
    name: 'Nebraska', center: [41.5, -99.8], zoom: 7,
    emsFile: 'data/ne-ems-simple.geojson', stateFile: 'data/ne-state-simple.geojson',
    nameField: 'DsplayName', features: 977, agencies: 505,
    source: 'NE Public Service Commission / NG911', authoritative: true,
    notes: 'Rescue district response areas. NG911 official data.',
  },
  or: {
    name: 'Oregon', center: [44.0, -120.5], zoom: 7,
    emsFile: 'data/or-ems-simple.geojson', stateFile: 'data/or-state-simple.geojson',
    nameField: 'name', features: 125, agencies: 100,
    source: 'OR Dept of Human Services / OHA', authoritative: true,
    notes: 'Oregon Ambulance Service Areas. County ASPs required by state law.',
  },
  vt: {
    name: 'Vermont', center: [44.0, -72.7], zoom: 8,
    emsFile: 'data/vt-ems-simple.geojson', stateFile: 'data/vt-state-simple.geojson',
    nameField: 'Serv_Name', features: 67, agencies: 67,
    source: 'Vermont Center for Geographic Information (VCGI)', authoritative: true,
    notes: 'Ambulance service areas with cert level and coverage towns.',
  },
  ks: {
    name: 'Kansas', center: [38.5, -98.0], zoom: 7,
    emsFile: 'data/ks-ems-simple.geojson', stateFile: 'data/ks-state-simple.geojson',
    nameField: 'name', features: 362, agencies: 301,
    source: 'Kansas NG911 ESB', authoritative: true,
    notes: 'NG911 Emergency Service Boundaries filtered to EMS.',
  },
  me: {
    name: 'Maine', center: [45.3, -69.0], zoom: 7,
    emsFile: 'data/me-ems-simple.geojson', stateFile: 'data/me-state-simple.geojson',
    nameField: 'name', features: 256, agencies: 245,
    source: 'Maine E911 / Emergency Services Communication Bureau', authoritative: true,
    notes: 'EMS zones from Maine E911 system. NG911 official.',
  },
  wa: {
    name: 'Washington', center: [47.4, -120.7], zoom: 7,
    emsFile: 'data/wa-ems-simple.geojson', stateFile: 'data/wa-state-simple.geojson',
    nameField: 'name', features: 1821, agencies: 481,
    source: 'WA Military Dept / Emergency Management Division', authoritative: true,
    notes: 'Emergency response boundaries extracted from WA E911 system.',
  },
  ok: {
    name: 'Oklahoma', center: [35.5, -97.5], zoom: 7,
    emsFile: 'data/ok-ems-simple.geojson', stateFile: 'data/ok-state-simple.geojson',
    nameField: 'name', features: 83, agencies: 68,
    source: 'OK Tax Commission / Ad Valorem Division', authoritative: true,
    notes: 'EMS district boundaries.',
  },
  mo: {
    name: 'Missouri', center: [38.6, -92.6], zoom: 7,
    emsFile: 'data/mo-ems-simple.geojson', stateFile: 'data/mo-state-simple.geojson',
    nameField: 'name', features: 767, agencies: 90,
    source: 'MO State Emergency Management Agency (MOSEMA)', authoritative: true,
    notes: 'Missouri ambulance boundary data.',
  },
  wi: {
    name: 'Wisconsin', center: [44.5, -89.8], zoom: 7,
    emsFile: 'data/wi-ems-simple.geojson', stateFile: 'data/wi-state-simple.geojson',
    nameField: 'name', features: 2384, agencies: 514,
    source: 'WI Office of Emergency Communications / NG911', authoritative: true,
    notes: 'NG911 GIS service polygons. Most granular state dataset.',
  },
  az: {
    name: 'Arizona', center: [34.3, -111.7], zoom: 7,
    emsFile: 'data/az-ems-simple.geojson', stateFile: 'data/az-state-simple.geojson',
    nameField: 'name', features: 197, agencies: 178,
    source: 'AZ 911 Program / AZGEO', authoritative: true,
    notes: 'NG911 EMS boundaries from county 911 coordinators.',
  },
  id: {
    name: 'Idaho', center: [44.4, -114.7], zoom: 7,
    emsFile: 'data/id-ems-simple.geojson', stateFile: 'data/id-state-simple.geojson',
    nameField: 'NAME', features: 300, agencies: 14,
    source: 'ID Dept of Health & Welfare / State EMS Bureau', authoritative: false,
    notes: 'Partial county EMS coverage areas.',
  },
};

const params = new URLSearchParams(window.location.search);
const stateKey = params.get('s') || 'nd';
const S = STATES[stateKey];

if (!S) { document.body.innerHTML = '<h1 style="padding:40px">State not found. <a href="index.html">Back to map</a></h1>'; }

document.title = `${S.name} 911 EMS Coverage Map`;
const badge = S.authoritative
  ? '<span class="auth-badge">VERIFIED DATA</span>'
  : '<span class="auth-badge" style="background:#fff3cd;color:#856404">UNVERIFIED</span>';
document.getElementById('title').innerHTML = `${S.name} EMS Coverage ${badge}`;
document.getElementById('subtitle').textContent = `${S.features} service area boundaries. ${S.agencies} agencies.`;
document.getElementById('footer').innerHTML = `Source: ${S.source}. ${S.notes}`;

// Highlight active nav link
document.querySelectorAll('.nav-links a').forEach(a => {
  if (a.href.includes(`s=${stateKey}`)) a.classList.add('active');
});

// Color palette - hash agency name to consistent color
const PALETTE = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22',
  '#c0392b','#2980b9','#27ae60','#d35400','#8e44ad','#16a085','#f1c40f',
  '#7f8c8d','#2c3e50','#a93226','#148f77','#d4ac0d','#6c3483','#1a5276',
  '#117a65','#b03a2e','#0e6655','#922b21','#7d3c98','#138d75','#cb4335'];

function agencyColor(name) {
  if (!name) return '#95a5a6';
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(hash) % PALETTE.length];
}

const map = L.map('map', {
  maxBounds: [[15, -180], [72, -50]],
  maxBoundsViscosity: 1.0,
  minZoom: 3,
}).setView(S.center, S.zoom);
// Light base without labels - colors pop better
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
}).addTo(map);

let areaLyrs = {};
const labelGroup = L.layerGroup();

Promise.all([
  fetch(S.stateFile).then(r => r.json()),
  fetch(S.emsFile).then(r => r.json()),
]).then(([state, ems]) => {
  L.geoJSON(state, { style: { fillColor: 'transparent', fillOpacity: 0, color: '#333', weight: 3, opacity: 0.9 } }).addTo(map);

  ems.features.forEach(f => {
    const p = f.properties;
    const name = p[S.nameField] || p.DsplayName || p.dsplayname || 'Unknown';
    const county = p.County || p.county || '';
    const agencyId = p.Agency_ID || p.agency_id || '';
    const color = agencyColor(name);

    const lyr = L.geoJSON(f, {
      style: { fillColor: color, fillOpacity: 0.6, color: '#222', weight: 1.5, opacity: 0.8 }
    }).addTo(map);

    // Build extra fields for popup
    let extras = '';
    if (S.extraFields) {
      S.extraFields.forEach(field => {
        const val = p[field];
        if (val) extras += `<div class="row"><strong>${field.replace(/([A-Z])/g,' $1').trim()}:</strong> ${val}</div>`;
      });
    }
    const distType = p.district_type || p.source || '';
    if (distType) extras += `<div class="row"><strong>Type:</strong> ${distType}</div>`;

    lyr.bindPopup(`<div class="info-popup">
      <h3>${name}</h3>
      ${county ? `<div class="row"><strong>County:</strong> ${county}</div>` : ''}
      ${agencyId ? `<div class="row"><strong>Agency ID:</strong> ${agencyId}</div>` : ''}
      ${extras}
      <div class="row" style="color:#999;font-size:11px"><strong>Source:</strong> ${S.source}</div>
      ${!S.authoritative ? '<div class="row" style="color:#e67e22;font-size:11px">Unverified - may not reflect actual 911 transport</div>' : ''}
    </div>`);

    lyr.on('mouseover', function() { this.setStyle({ fillOpacity: 0.8, weight: 3, color: '#fff' }); });
    lyr.on('mouseout', function() { this.setStyle({ fillOpacity: 0.6, weight: 1.5, color: '#222' }); });

    areaLyrs[name + '_' + county] = lyr;

    const bounds = lyr.getBounds();
    L.marker(bounds.getCenter(), {
      icon: L.divIcon({ className: 'district-label', html: `<span>${name.split(',')[0].substring(0,25)}</span>`, iconSize: null })
    }).addTo(labelGroup);
  });

  // City/town name labels on top of everything
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom: 18, pane: 'overlayPane'
  }).addTo(map);

  // Agency labels only at high zoom
  function updateLabels() {
    if (map.getZoom() >= 12) { if (!map.hasLayer(labelGroup)) labelGroup.addTo(map); }
    else { if (map.hasLayer(labelGroup)) map.removeLayer(labelGroup); }
  }
  map.on('zoomend', updateLabels);
  updateLabels();

  // Load HIFLD ambulance stations as city markers
  fetch('data/hifld-ambulance-simple.geojson').then(r => r.json()).then(hifld => {
    const stateAbbrevs = { 'Colorado':'CO','Georgia':'GA','Minnesota':'MN','North Dakota':'ND','Utah':'UT',
      'Indiana':'IN','Kentucky':'KY','Nebraska':'NE','Oregon':'OR','Vermont':'VT','Kansas':'KS',
      'Maine':'ME','Washington':'WA','Oklahoma':'OK','Missouri':'MO','Wisconsin':'WI','Arizona':'AZ','Idaho':'ID' };
    const abbrev = stateAbbrevs[S.name] || '';
    const stations = hifld.features.filter(f => f.properties.STATE === abbrev && f.geometry);
    const cityGroup = L.layerGroup();
    const seen = new Set();
    stations.forEach(f => {
      const city = f.properties.CITY || '';
      const name = f.properties.NAME || '';
      const coords = f.geometry.coordinates;
      if (!city || !coords[0] || !coords[1]) return;
      // One label per city
      if (!seen.has(city)) {
        seen.add(city);
        L.marker([coords[1], coords[0]], {
          icon: L.divIcon({ className: 'district-label', html: `<span style="font-size:8px;opacity:0.7">${city}</span>`, iconSize: null })
        }).addTo(cityGroup);
      }
      // Station dot
      L.circleMarker([coords[1], coords[0]], {
        radius: 3, fillColor: '#fff', color: '#fff', weight: 0.5, fillOpacity: 0.5
      }).bindPopup(`<div class="info-popup"><h3>${name}</h3><div class="row">${city}, ${abbrev}</div></div>`).addTo(cityGroup);
    });
    function updateCities() {
      if (map.getZoom() >= 9) { if (!map.hasLayer(cityGroup)) cityGroup.addTo(map); }
      else { if (map.hasLayer(cityGroup)) map.removeLayer(cityGroup); }
    }
    map.on('zoomend', updateCities);
    updateCities();
  }).catch(() => {});

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (q.length < 2) return;
    for (const [key, lyr] of Object.entries(areaLyrs)) {
      if (key.toLowerCase().includes(q)) {
        map.fitBounds(lyr.getBounds().pad(0.3));
        lyr.getLayers()[0].openPopup();
        return;
      }
    }
  });
});
</script>
</body>
</html>
